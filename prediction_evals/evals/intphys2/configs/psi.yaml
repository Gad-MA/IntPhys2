# IntPhys2 evaluation config for PSI-0.5
# (StanfordNeuroAILab/psi0_5 — pixel-space L1 surprise, single-frame prediction)
#
# USAGE — local (single GPU):
#   cd prediction_evals/
#   python -m evals.main --devices cuda:0 --fname evals/intphys2/configs/psi.yaml
#
# USAGE — SLURM cluster:
#   python -m evals.main_distributed \
#     --fname evals/intphys2/configs/psi.yaml \
#     --folder ./logs --partition YOUR_PARTITION
#
# NOTE: PSI generates frames autoregressively (one token at a time), so
# inference is slower than V-JEPA / VideoMAEv2.  Start on intphys2-debug
# (60 videos) to verify correctness before switching to intphys2-main.

# Cluster / distributed settings
nodes: 1
tasks_per_node: 1   # Use 1 GPU per node; PSI is memory-intensive

tag: default
eval_name: intphys2

# Output directory for .pth loss files (update to your desired path)
folder: ./results/psi0_5/
resume_checkpoint: false

experiment:
  data:
    batch_size: 1          # PSI is slow; keep batch size at 1
    resolution: 224        # IntPhys2 native resolution
    stride_sliding_window: 2
    # PSI handles its own dtype (bfloat16) internally.
    # Disable autocast in the harness to avoid bfloat16 PIL conversion issues.
    use_bfloat16: false
    # PSI's notation parser only accepts single-digit time indices (rgb0–rgb9),
    # so the total number of frames (context + predicted) must be ≤ 10.
    # frames_per_clip=10 ensures we never exceed rgb9.
    frames_per_clip: 10
    # context_lengths must be even (tubelet_size=2) and < frames_per_clip (< 10).
    # With frames_per_clip=10:
    #   context_length → frames predicted
    #   2 → 8  (rgb0,rgb1 -> rgb2..rgb9)
    #   4 → 6  (rgb0..rgb3 -> rgb4..rgb9)
    #   6 → 4  (rgb0..rgb5 -> rgb6..rgb9)
    #   8 → 2  (rgb0..rgb7 -> rgb8,rgb9)
    context_lengths: [2, 4, 6, 8]
    frame_steps: 10        # Sample every 10th frame from the raw video
    num_frames_to_pred: -1 # Use full frames_per_clip window
    dataset: intphys2-debug  # Start here; switch to intphys2-main when ready

  # Also evaluate with shorter context lengths on the video beginning,
  # so physics violations that occur early are not missed.
  max_context_mode: true

model_kwargs:
  # HuggingFace repo ID (auto-downloaded on first run) or local directory.
  checkpoint: StanfordNeuroAILab/psi0_5

  # Python import path for the wrapper module (relative to prediction_evals/).
  module_name: app.psi.modelcustom.default_wrapper

  # Passed as wrapper_kwargs to init_module → AnticipativePSIWrapper.__init__
  wrapper_kwargs:
    gen_temp: 1.0      # Sampling temperature (1.0 = unmodified)
    gen_top_k: 1000    # Top-K nucleus (PSI README recommendation for RGB)
    gen_top_p: 1.0     # Top-P nucleus  (1.0 = disabled)
    gen_seed: 42       # RNG seed for reproducible generation
    # Must match stride_sliding_window above so frame indices in filenames
    # correctly reflect the absolute sampled-frame position in the video.
    viz_stride: 2
    # Must match frame_steps above. Converts sampled-frame index → raw video
    # frame index in the output filename: raw_frame = sampled_frame × viz_frame_step
    viz_frame_step: 10
    # Directory to save real-time visualizations.
    # Each PSI generation writes one 4-panel PNG immediately:
    #   [ Context frame | PSI prediction | Ground truth | Diff ×5 ]
    # Filename encodes sample index, context length, and L1 score.
    # Set to null (or remove) to disable visualization entirely.
    viz_dir: ./results/psi0_5/viz/

  # Passed as model_kwargs (pretrain_kwargs) to init_module
  pretrain_kwargs:
    resolution: 224    # Must match experiment.data.resolution above
